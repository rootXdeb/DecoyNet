<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DecoyNetAI — Attacks</title>
<link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
<nav class="navbar">
  <span class="logo">🛡 DecoyNetAI</span>
  <a href="/">Dashboard</a>
  <a href="/attacks" class="active">Attacks</a>
  <a href="/clusters">Clusters</a>
  <a href="/reports">Reports</a>
  <a href="/api/docs">API</a>
</nav>

<main class="container">
  <h2>Attack Timeline</h2>

  <div class="filters">
    <select id="level-filter" onchange="applyFilter()">
      <option value="">All Levels</option>
      <option value="LOW">Low</option>
      <option value="MEDIUM">Medium</option>
      <option value="HIGH">High</option>
      <option value="CRITICAL">Critical</option>
    </select>
    <select id="type-filter" onchange="applyFilter()">
      <option value="">All Types</option>
      <option value="bot">Bot</option>
      <option value="human">Human</option>
      <option value="advanced">Advanced</option>
      <option value="unknown">Unknown</option>
    </select>
    <select id="proto-filter" onchange="applyFilter()">
      <option value="">All Protocols</option>
      <option value="SSH">SSH</option>
      <option value="HTTP">HTTP</option>
      <option value="FTP">FTP</option>
      <option value="TELNET">Telnet</option>
      <option value="MYSQL">MySQL</option>
      <option value="REDIS">Redis</option>
      <option value="SMTP">SMTP</option>
      <option value="RDP">RDP</option>
      <option value="SMB">SMB</option>
      <option value="MONGODB">MongoDB</option>
      <option value="ELASTICSEARCH">Elasticsearch</option>
      <option value="VNC">VNC</option>
    </select>
  </div>

  <section class="table-box" style="margin-top:16px">
    <h3>Sessions <span id="session-count" style="font-size:11px;color:#94a3b8;font-weight:400"></span></h3>
    <table>
      <thead>
        <tr>
          <th>Time</th><th>IP</th><th>Protocol</th><th>Type</th>
          <th>Commands</th><th>Score</th><th>Level</th><th>Duration</th><th>Chain</th>
        </tr>
      </thead>
      <tbody id="attack-body">
        <tr><td colspan="9" style="text-align:center;color:#94a3b8;padding:20px">Loading...</td></tr>
      </tbody>
    </table>
  </section>

  <section class="table-box">
    <h3>Credential Harvest Log <span style="font-size:11px;color:#94a3b8;font-weight:400">(latest 100)</span></h3>
    <table>
      <thead><tr><th>Time</th><th>IP</th><th>Username</th><th>Password</th></tr></thead>
      <tbody id="auth-body">
        <tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:20px">Loading...</td></tr>
      </tbody>
    </table>
  </section>
</main>

<script>
let allSessions = [];

async function load() {
  const [sessRes, authRes] = await Promise.all([
    fetch('/api/sessions?limit=500'),
    fetch('/api/auth_attempts')
  ]);
  allSessions = await sessRes.json();
  const auths = await authRes.json();
  renderSessions(allSessions);
  renderAuths(auths);
}

function applyFilter() {
  const level = document.getElementById('level-filter').value;
  const type  = document.getElementById('type-filter').value;
  const proto = document.getElementById('proto-filter').value;
  const filtered = allSessions.filter(s =>
    (!level || s.threat_level === level) &&
    (!type  || s.attacker_type === type) &&
    (!proto || (s.protocol || 'SSH') === proto)
  );
  renderSessions(filtered);
}

function renderSessions(sessions) {
  document.getElementById('session-count').textContent = `(${sessions.length} sessions)`;
  const tbody = document.getElementById('attack-body');
  if (!sessions.length) {
    tbody.innerHTML = '<tr><td colspan="9" style="text-align:center;color:#94a3b8;padding:20px">No sessions match filter</td></tr>';
    return;
  }
  tbody.innerHTML = sessions.map(s => `
    <tr>
      <td style="font-size:12px">${s.start_time ? new Date(s.start_time*1000).toLocaleString() : '—'}</td>
      <td><code>${s.ip || '—'}</code></td>
      <td><span class="badge badge-info">${s.protocol || 'SSH'}</span></td>
      <td><span class="badge badge-${typeBadge(s.attacker_type)}">${s.attacker_type || 'unknown'}</span></td>
      <td>${s.command_count ?? 0}</td>
      <td><strong>${s.threat_score ?? 0}</strong></td>
      <td><span class="badge badge-${levelBadge(s.threat_level)}">${s.threat_level || 'LOW'}</span></td>
      <td>${s.duration ? s.duration.toFixed(1)+'s' : '—'}</td>
      <td style="font-size:11px;color:#94a3b8">${s.attack_chain || '—'}</td>
    </tr>`).join('');
}

function renderAuths(auths) {
  const tbody = document.getElementById('auth-body');
  if (!auths.length) {
    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:#94a3b8;padding:20px">No auth attempts yet</td></tr>';
    return;
  }
  tbody.innerHTML = auths.map(a => `
    <tr>
      <td style="font-size:12px">${a.timestamp ? new Date(a.timestamp*1000).toLocaleTimeString() : '—'}</td>
      <td><code>${a.ip}</code></td>
      <td><code>${a.username}</code></td>
      <td><code>${a.password}</code></td>
    </tr>`).join('');
}

function levelBadge(l) {
  return {LOW:'green',MEDIUM:'warn',HIGH:'orange',CRITICAL:'danger'}[l] || 'info';
}
function typeBadge(t) {
  return {bot:'info',human:'green',advanced:'danger',unknown:'warn'}[t] || 'warn';
}

load();
setInterval(load, 10000);
</script>
</body>
</html>
