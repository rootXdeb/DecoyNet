<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DecoyNetAI — Dashboard</title>
<link rel="stylesheet" href="/static/style.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<nav class="navbar">
  <span class="logo">🛡 DecoyNetAI</span>
  <a href="/" class="active">Dashboard</a>
  <a href="/attacks">Attacks</a>
  <a href="/clusters">Clusters</a>
  <span id="live-badge" class="badge badge-green">● LIVE</span>
</nav>

<main class="container">

  <!-- Stat cards -->
  <section class="stat-grid">
    <div class="stat-card">
      <p class="stat-label">Total Sessions</p>
      <p class="stat-value" id="stat-sessions">0</p>
    </div>
    <div class="stat-card danger">
      <p class="stat-label">High / Critical</p>
      <p class="stat-value" id="stat-high">0</p>
    </div>
    <div class="stat-card warn">
      <p class="stat-label">Malware Caught</p>
      <p class="stat-value" id="stat-malware">0</p>
    </div>
    <div class="stat-card info">
      <p class="stat-label">Known IOCs</p>
      <p class="stat-value" id="stat-iocs">0</p>
    </div>
  </section>

  <!-- Charts -->
  <section class="chart-grid">
    <div class="chart-box">
      <h3>Attacker Types</h3>
      <canvas id="typeChart"></canvas>
    </div>
    <div class="chart-box">
      <h3>Threat Score Timeline</h3>
      <canvas id="timelineChart"></canvas>
    </div>
  </section>

  <!-- Recent sessions -->
  <section class="table-box">
    <h3>Recent Sessions <span style="font-size:11px;color:#94a3b8;font-weight:400">(auto-refreshes every 5s)</span></h3>
    <table>
      <thead>
        <tr>
          <th>IP</th>
          <th>Time</th>
          <th>Commands</th>
          <th>Type</th>
          <th>Score</th>
          <th>Level</th>
        </tr>
      </thead>
      <tbody id="session-body">
        <tr><td colspan="6" style="text-align:center;color:#94a3b8;padding:20px">
          Loading...
        </td></tr>
      </tbody>
    </table>
  </section>

  <!-- Top IPs -->
  <section class="table-box">
    <h3>Top Attacker IPs</h3>
    <table>
      <thead><tr><th>IP</th><th>Hits</th><th>Max Score</th></tr></thead>
      <tbody id="top-ip-body">
        <tr><td colspan="3" style="text-align:center;color:#94a3b8;padding:12px">Loading...</td></tr>
      </tbody>
    </table>
  </section>

</main>

<script src="/static/main.js"></script>
</body>
</html>
